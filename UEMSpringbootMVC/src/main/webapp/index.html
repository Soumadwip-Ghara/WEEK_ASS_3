<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Page</title>
</head>
<body>

<form action="login" method="post">
	<table>
		<tr>
			<td>User :</td>
			<td><input type="text" name="user"></td>
		</tr>

		<tr>
			<td>Password :</td>
			<td><input type="password" name="password"></td>
		</tr>

		<tr>
			<td><input type="submit" value="Login"></td>
			<td><input type="reset" value="Reset"></td>
		</tr>
	</table>
</form>

</body>
</html>
